title: >
  ## Over two decades of shipping great software and helping others do the same.
content: >
  * Originally from Scotland, Rod lives in San Francisco and is Director of Engineering for Infrastructure and Engineering Velocity at <a href="https://splice.com/" target="_blank" rel="noopener noreferrer">Splice</a>. He also provides independent coaching and mentorship for engineering leaders.

  * Before this, he led product engineering for Splice Sounds, ran the Smart TV Games engineering org at Volley, and was a Senior Engineering Manager at Discord and Dropbox. Past lives have been as Co-Founder & CTO of Sosh, VP of Software Engineering at Anova Culinary, and writing code at places like Slide, Bose, and — for 39 days — Google.

  * His writing is featured on <a href="https://leaddev.com/community/rod-begbie" target="_blank" rel="noopener noreferrer">LeadDev.com</a> and in O’Reilly’s <a href="https://www.oreilly.com/library/view/97-things-every/9780596809515/" target="_blank" rel="noopener noreferrer"><em>97 Things Every Programmer Should Know:</em> Collective Wisdom from the Experts</a>, and he's spoken at conferences including LeadDev New York and Calibrate.

