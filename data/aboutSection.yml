title: >
  ## Over two decades of shipping great software and helping others do the same.
content: >
  * Originally from Scotland, Rod now lives in San Francisco and is Director of Engineering for Infrastructure and Engineering Velocity at <a href="https://splice.com/" target="_blank" rel="noopener noreferrer">Splice</a>, alongside independent coaching and mentorship for engineering leaders.

  * Before this, he led product engineering for Splice Sounds, ran the Smart TV Games engineering org at Volley, and was a Senior Engineering Manager at Discord and Dropbox. Past lives have been as Co-Founder & CTO of Sosh, VP of Software Engineering at Anova Culinary, and writing code at places like Slide, Bose, and – for 39 days – Google.

  * His writing is featured on [LeadDev.com](https://leaddev.com/community/rod-begbie) and in O’Reilly’s [*97 Things Every Programmer Should Know:* Collective Wisdom from the Experts](https://www.oreilly.com/library/view/97-things-every/9780596809515/), and he's spoken at conferences including LeadDev New York and Calibrate.

